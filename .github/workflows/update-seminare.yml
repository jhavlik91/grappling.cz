name: Update Seminare

on:
  schedule:
    - cron: "0 4,8,10,12,16,18 * * *" # 6,10,12,14,18,20 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch seminars
        run: npx tsx scripts/fetch-seminare.ts
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}

      - name: Check for changes
        id: changes
        run: |
          if git diff-index --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/seminare.json
          git commit -m "chore: update seminare [skip ci]"
          git push

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=grappling-cz
