name: Update Turnaje

on:
  schedule:
    - cron: "0 1 * * *" # 3:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch events metadata
        run: npx tsx scripts/fetch-events-metadata.ts

      - name: Sync Smoothcomp data
        run: npm run sync-data

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events-metadata.json
          git add public/data/rankings.json
          git add public/data/events/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update tournament data and rankings [skip ci]"
            git push
          else
            echo "No data changes."
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=grappling-cz
